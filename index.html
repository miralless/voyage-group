<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Mapa Grupal - Login & Registro</title>
    <link rel="stylesheet" href="styles/styles.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Cuadrilla">
    <link rel="manifest" href="./manifest.json">
</head>
<body>

    <div class="auth-card">
        <h2 id="auth-title" style="color: white;">Iniciar Sesión</h2>
        <p id="auth-subtitle" style="color: white;">Entra para ver los recuerdos de tus viajes, ¡o añadir nuevos!</p>

        <form id="login-form">
            <div id="step-1">
                <div class="input-group">
                    <label for="email" style="color: white;">Email</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required style="background-color: #1f2937; color: white">
                </div>
                
                <div class="input-group">
                    <label for="password" style="color: white;">Contraseña</label>
                    <input type="password" id="password" placeholder="Introduce tu contraseña" required style="background-color: #1f2937; color: white">
                </div>
            </div>

            <div id="step-2" style="display: none;">
                <div class="avatar-upload">
                    <div class="avatar-preview">
                        <img id="avatar-image" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
                    </div>
                    <label for="avatar-input" class="avatar-label">Subir Foto</label>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </div>

                <div class="input-group">
                    <label for="username" style="color: white">Nombre de usuario</label>
                    <input type="text" id="username" placeholder="ej: carlos92" style="background-color: #1f2937; color: white">
                </div>

                <div class="input-group">
                    <label for="nombreCompleto" style="color: white;">Nombre y Apellido(s)</label>
                    <input type="text" id="nombreCompleto" placeholder="ej: Carlos Pérez Gómez" style="background-color: #1f2937; color: white">
                </div>
                
                <a href="#" id="btn-back" style="display: block; margin-bottom: 0.25rem; font-size: 0.85rem; color: var(--text-muted); text-decoration: none;">← Volver al paso anterior</a>
            </div>

            <button type="submit" id="submit-btn">Entrar</button>
        </form>

        <div class="auth-toggle">
            <span id="toggle-text" style="color: white;">¿No tienes cuenta?</span> 
            <a href="#" id="go-to-register">Regístrate aquí</a>
        </div>
    </div>

    <!-- El script con la lógica que ya programamos -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
