<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoyageGroup - Panel del Grupo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="styles/styles.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Cuadrilla">
    <link rel="manifest" href="./manifest.json">
</head>
<body class="app-body">

    <div id="app-loader" class="loader-backdrop">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <nav class="app-nav">
        <div class="logo"><span style="color: white;">Voyage</span>Group</div>
        <div class="user-info">
            <span id="nav-username">@usuario</span>
        </div>
    </nav>

    <main class="group-layout">

        <div class="group-header">
            <div>
                <h2 id="group-name-title">Cargando...</h2>
                <p style="font-size: 0.85rem; color: #9ca3af; margin-top: 0.25rem;" id="group-participants-count">0 participantes</p>
            </div>
            <span id="group-code-badge" class="group-code-badge-large">------</span>
        </div>
        
        <section class="map-achievements-container">
            <div id="group-main-map"></div>
        </section>

        <section class="sidebar-trips">
            <div class="trips-section">
                <div id="trips-container" class="trips-grid">
                    <p class="loading-text" style="color: #9ca3af; text-align: center; padding: 1.5rem;">No hay viajes registrados en este grupo todavía. ¡Crea el primero!</p>
                </div>

                <button id="btn-open-trip-modal" class="btn-add-trip" style="width: 100%; height: 40px; margin-top: 0.5rem;">Agregar Nuevo Viaje</button>
                
                <button id="btn-abandonar-grupo" style="background: #ef4444; height: 40px; border: 1px solid #ef4444; color: white; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; margin-top:-5rem; margin-bottom: 1.5rem; transition: background 0.2s;">
                    Abandonar Grupo
                </button>
            </div>
        </section>

    </main>

    <footer class="app-footer">
        <a href="app.html" class="footer-link">
            <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </a>
        <a href="perfil.html" class="footer-link active">
            <img id="footer-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Perfil" class="footer-avatar-img">
        </a>
    </footer>

    <dialog id="trip-modal" class="custom-dialog" style="max-height: 85vh; overflow-y: auto;">
        <h3 style="color: white; margin-bottom: 0.5rem; font-size: 1.2rem;">Registrar Nuevo Viaje</h3>
        <p style="color: #9ca3af; font-size: 0.85rem; margin-bottom: 1.5rem;">Completa los datos de la escapada de la cuadrilla.</p>
        
        <form id="form-new-trip" style="display: flex; flex-direction: column; gap: 1rem; text-align: left; margin-bottom: 0.5rem;">
            <div>
                <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem;">Nombre del Viaje:</label>
                <input type="text" id="new-trip-name" placeholder="Ej: Interrail Verano, Despedida de soltero..." style="width: 100%; padding: 0.75rem; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white;" required>
            </div>

            <div>
                <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem;">Ciudad de Destino:</label>
                <input type="text" id="new-trip-city" placeholder="Ej: París, Roma, Tokio..." style="width: 100%; padding: 0.75rem; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white;" required>
                
                <div id="trip-city-results" style="display: none; background: #1f2937; border: 1px solid #374151; border-radius: 8px; margin-top: 0.5rem; max-height: 180px; overflow-y: auto;"></div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem;">Fecha de Ida:</label>
                    <input type="date" id="new-trip-start-date" style="width: 100%; padding: 0.75rem; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; color-scheme: dark;" required>
                </div>
                <div style="flex: 1;">
                    <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem;">Fecha de Vuelta:</label>
                    <input type="date" id="new-trip-end-date" style="width: 100%; padding: 0.75rem; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; color-scheme: dark;" required>
                </div>
            </div>

            <div>
                <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem; font-weight: 600;">¿Quiénes han ido a este viaje?:</label>
                <div id="trip-participants-checklist" style="background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 0.75rem; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;">
                    <p style="color: #9ca3af; font-size: 0.8rem; margin: 0; font-style: italic;">Cargando miembros del grupo...</p>
                </div>
            </div>

            <div>
                <label style="color: #d1d5db; font-size: 0.85rem; display: block; margin-bottom: 0.4rem;">Fotos del viaje:</label>
                <input type="file" id="new-trip-photos" accept="image/*" multiple style="width: 100%; padding: 0.5rem; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; font-size: 0.85rem;">
                <small style="color: #9ca3af; font-size: 0.75rem; display: block; margin-top: 0.25rem;">Puedes seleccionar varias fotos a la vez.</small>
            </div>
        </form>

        <div class="dialog-actions">
            <button class="dialog-btn dialog-btn-secondary" id="btn-close-trip-modal">Cancelar</button>
            <button class="dialog-btn dialog-btn-primary" id="btn-submit-trip">Crear Viaje</button>
        </div>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script type="module" src="js/grupo.js"></script>
</body>
</html>
