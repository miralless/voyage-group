<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoyageGroup - Mi Perfil</title>
    <link rel="stylesheet" href="styles/styles.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Cuadrilla">
    <link rel="manifest" href="./manifest.json">
</head>
<body class="app-body">

    <div id="app-loader" class="loader-overlay">
        <div class="loader-spinner"></div>
        <p>Cargando...</p>
    </div>

    <nav class="app-nav">
        <div class="logo"><span style="color: white;">Voyage</span>Group</div>
        <div class="user-info">
            <span id="nav-username">@usuario</span>
        </div>
    </nav>

    <main class="app-main profile-main">
        <div class="profile-card">
            <div class="profile-avatar-wrapper">
                <div class="avatar-editable-container" id="btn-change-photo">
                    <img id="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de perfil">
                    <div class="camera-overlay">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </div>
                </div>
                <input type="file" id="profile-file-input" accept="image/*" style="display: none;">
            </div>
            
            <h2 id="profile-name">Cargando nombre...</h2>
            <p id="profile-username" class="profile-username-text">@username</p>

            <div class="profile-stats">
                <div class="stat-box">
                    <span class="stat-label">Grupos</span>
                    <span id="stat-groups-count" class="stat-number">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Viajes</span>
                    <span id="stat-pins-count" class="stat-number">0</span>
                </div>
            </div>
            
            <div class="profile-details">
                <div class="detail-item">
                    <span class="detail-label">Correo Electrónico</span>
                    <span id="profile-email" class="detail-value">cargando...</span>
                </div>
            </div>

            <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
        </div>
    </main>

    <footer class="app-footer">
        <a href="app.html" class="footer-link">
            <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </a>
        <a href="perfil.html" class="footer-link active">
            <img id="footer-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Perfil" class="footer-avatar-img">
        </a>
    </footer>

    <script type="module" src="js/perfil.js"></script>
</body>
</html>
